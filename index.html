<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drk External - Key System</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;600;700&display=swap');
        
        body {
            background-color: #120A1F;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .container {
            background-color: #1C112E;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0px 0px 20px #2A0845;
            text-align: center;
            width: 90%;
            max-width: 420px;
            border: 1px solid #4A1C40;
        }

        h1 {
            color: #A855F7;
            margin-bottom: 5px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .user-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #D8B4E2;
        }

        .user-info img {
            width: 30px;
            border-radius: 50%;
        }

        p {
            color: #D8B4E2;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .key-display {
            background-color: #241639;
            border: 1px solid #4A1C40;
            padding: 15px;
            font-size: 18px;
            font-family: monospace;
            border-radius: 5px;
            margin-bottom: 10px;
            color: #FFF;
            word-wrap: break-word;
            min-height: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .key-display:hover {
            border-color: #7B2CBF;
        }

        .timer {
            font-size: 13px;
            color: #A855F7;
            margin-bottom: 20px;
            font-weight: bold;
        }

        button {
            background-color: #7B2CBF;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button:hover:not(:disabled) {
            background-color: #9D4EDD;
            box-shadow: 0px 0px 10px #7B2CBF;
        }

        button:disabled {
            background-color: #4A1C40;
            cursor: not-allowed;
            color: #AAA;
        }

        .google-btn {
            background-color: #FFF;
            color: #444;
        }
        .google-btn:hover {
            background-color: #EEE;
            box-shadow: 0px 0px 10px #FFF;
        }

        .status {
            margin-top: 15px;
            font-size: 13px;
            color: #61A5C2;
            height: 15px;
        }
        .error {
            color: #FF5252;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="container">
        <h1>DRK EXTERNAL</h1>
        
        <div id="authPanel">
            <p>Login to generate your 24-hour key.</p>
            <button class="google-btn" onclick="login()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
                Login with Google
            </button>
        </div>

        <div id="mainPanel" class="hidden">
            <div class="user-info">
                <img id="userImg" src="">
                <span id="userName">User</span>
                <a href="#" onclick="logout()" style="color: #FF5252; text-decoration: none; font-size: 11px;">Logout</a>
            </div>

            <div id="noKeySection">
                <p>Welcome! You can generate 1 key every 24 hours.</p>
                <button id="genBtn" onclick="handleGenerate()">GENERATE NEW KEY</button>
            </div>

            <div id="activeKeySection" class="hidden">
                <p>Your Active Key:</p>
                <div class="key-display" id="keyBox" title="Click to copy">Connecting...</div>
                <div class="timer" id="timerText">Expires in: --:--:--</div>
                <button onclick="copyKey()">COPY KEY</button>
            </div>
        </div>
        
        <div class="status" id="statusText"></div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, set, get, child, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyB-fiGhXqie8nAgHhBliKQNFRvnoge4-90",
            authDomain: "drk-external.firebaseapp.com",
            projectId: "drk-external",
            storageBucket: "drk-external.firebasestorage.app",
            messagingSenderId: "550880608599",
            appId: "1:550880608599:web:f5e50b8dc1c15483f03e12",
            databaseURL: "https://drk-external-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;
        let activeTimer = null;

        // UI Elements
        const authPanel = document.getElementById("authPanel");
        const mainPanel = document.getElementById("mainPanel");
        const noKeySection = document.getElementById("noKeySection");
        const activeKeySection = document.getElementById("activeKeySection");
        const userImg = document.getElementById("userImg");
        const userName = document.getElementById("userName");
        const keyBox = document.getElementById("keyBox");
        const timerText = document.getElementById("timerText");
        const statusText = document.getElementById("statusText");

        // Auth Logic
        window.login = () => signInWithPopup(auth, provider).catch(err => console.error(err));
        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                userName.innerText = user.displayName;
                userImg.src = user.photoURL;
                authPanel.classList.add("hidden");
                mainPanel.classList.remove("hidden");
                checkUserKey();
            } else {
                currentUser = null;
                authPanel.classList.remove("hidden");
                mainPanel.classList.add("hidden");
                statusText.innerText = "";
            }
        });

        async function checkUserKey() {
            const dbRef = ref(db);
            try {
                const snapshot = await get(child(dbRef, `users/${currentUser.uid}`));
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    const now = Date.now();

                    if (data.expires_at > now) {
                        showKey(data.key, data.expires_at);
                    } else {
                        showGenerateSection();
                    }
                } else {
                    showGenerateSection();
                }
            } catch (err) {
                console.error(err);
            }
        }

        function showKey(key, expiresAt) {
            noKeySection.classList.add("hidden");
            activeKeySection.classList.remove("hidden");
            keyBox.innerText = key;
            startCountdown(expiresAt);
        }

        function showGenerateSection() {
            noKeySection.classList.remove("hidden");
            activeKeysection?.classList.add("hidden");
            if (activeTimer) clearInterval(activeTimer);
        }

        window.handleGenerate = async () => {
            const btn = document.getElementById("genBtn");
            btn.disabled = true;
            btn.innerText = "GENERATING...";

            const newKey = generateDrkKeyFormat();
            const now = Date.now();
            const expiresAt = now + (24 * 60 * 60 * 1000);

            try {
                // Save to both /keys and /users
                const updates = {};
                updates[`keys/${newKey}`] = { created_at: now, expires_at: expiresAt, hwid: "UNBOUND", active: true, uid: currentUser.uid };
                updates[`users/${currentUser.uid}`] = { key: newKey, expires_at: expiresAt };
                
                await update(ref(db), updates);
                showKey(newKey, expiresAt);
            } catch (err) {
                console.error(err);
                statusText.innerText = "Error saving key to cloud.";
                btn.disabled = false;
                btn.innerText = "GENERATE NEW KEY";
            }
        };

        function generateDrkKeyFormat() {
            const chars = '0123456789ABCDEF';
            let res = '';
            for (let i = 0; i < 12; i++) res += chars.charAt(Math.floor(Math.random() * chars.length));
            return `DRK-${res.substring(0,4)}-${res.substring(4,8)}-${res.substring(8,12)}`;
        }

        function startCountdown(expiresAt) {
            if (activeTimer) clearInterval(activeTimer);
            activeTimer = setInterval(() => {
                const now = Date.now();
                const diff = expiresAt - now;

                if (diff <= 0) {
                    clearInterval(activeTimer);
                    showGenerateSection();
                    return;
                }

                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                timerText.innerText = `Expires in: ${h}h ${m}m ${s}s`;
            }, 1000);
        }

        window.copyKey = () => {
            navigator.clipboard.writeText(keyBox.innerText);
            statusText.innerText = "Key copied to clipboard!";
            setTimeout(() => statusText.innerText = "", 3000);
        }
    </script>
</body>
</html>
